<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calculator-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .operation-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .op-btn {
            background-color: #667eea;
            color: white;
        }
        
        .op-btn:hover {
            background-color: #5568d3;
        }
        
        .op-btn.active {
            background-color: #764ba2;
        }
        
        .result-btn {
            grid-column: 1 / -1;
            background-color: #48bb78;
            color: white;
            font-size: 18px;
        }
        
        .result-btn:hover {
            background-color: #38a169;
        }
        
        .clear-btn {
            grid-column: 1 / -1;
            background-color: #f56565;
            color: white;
        }
        
        .clear-btn:hover {
            background-color: #e53e3e;
        }
        
        .result-display {
            margin-top: 20px;
            padding: 15px;
            background-color: #f7fafc;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result-display h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #48bb78;
            word-break: break-all;
        }
        
        .error {
            color: #f56565;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1>Simple Calculator</h1>
        
        <div class="input-group">
            <label for="num1">First Number:</label>
            <input type="number" id="num1" step="any" placeholder="Enter first number">
        </div>
        
        <div class="input-group">
            <label for="num2">Second Number:</label>
            <input type="number" id="num2" step="any" placeholder="Enter second number">
        </div>
        
        <div class="operation-buttons">
            <button class="op-btn" onclick="setOperation('add')">+ Add</button>
            <button class="op-btn" onclick="setOperation('subtract')">- Subtract</button>
            <button class="op-btn" onclick="setOperation('multiply')">× Multiply</button>
            <button class="result-btn" onclick="calculate()">= Calculate</button>
            <button class="clear-btn" onclick="clearAll()">Clear</button>
        </div>
        
        <div class="result-display" id="resultDisplay" style="display: none;">
            <h3>Result:</h3>
            <div class="result-value" id="resultValue"></div>
        </div>
    </div>
    
    <script>
        let selectedOperation = null;
        
        function setOperation(operation) {
            selectedOperation = operation;
            // Visual feedback for selected operation
            document.querySelectorAll('.op-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        async function calculate() {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const resultDisplay = document.getElementById('resultDisplay');
            const resultValue = document.getElementById('resultValue');
            
            if (!num1 || !num2) {
                resultValue.textContent = 'Please enter both numbers';
                resultValue.classList.add('error');
                resultDisplay.style.display = 'block';
                return;
            }
            
            if (!selectedOperation) {
                resultValue.textContent = 'Please select an operation';
                resultValue.classList.add('error');
                resultDisplay.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        num1: parseFloat(num1),
                        num2: parseFloat(num2),
                        operation: selectedOperation
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultValue.textContent = data.result;
                    resultValue.classList.remove('error');
                } else {
                    resultValue.textContent = data.error || 'An error occurred';
                    resultValue.classList.add('error');
                }
                
                resultDisplay.style.display = 'block';
            } catch (error) {
                resultValue.textContent = 'Error: Could not reach the server. Make sure the Python server is running!';
                resultValue.classList.add('error');
                resultDisplay.style.display = 'block';
                console.error('Error:', error);
            }
        }
        
        function clearAll() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('resultDisplay').style.display = 'none';
            selectedOperation = null;
            document.querySelectorAll('.op-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }
        
        // Allow Enter key to calculate
        document.getElementById('num2').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
